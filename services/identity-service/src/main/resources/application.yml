spring:
  application:
    name: identity-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:smartstock_identity}
    username: ${DB_USER:smartstock}
    password: ${DB_PASSWORD:smartstock}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    deserialization:
      fail-on-unknown-properties: false
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${SERVER_PORT:8081}
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: INFO
    com.smartstock.identity: INFO
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} level=%p service=identity-service requestId=%X{requestId:-} correlationId=%X{correlationId:-} userId=%X{userId:-} logger=%logger{36} msg=%m%n"

app:
  security:
    jwt:
      issuer: ${JWT_ISSUER:smartstock-auth}
      audience: ${JWT_AUDIENCE:smartstock-api}
      access-token-validity: PT1H
      refresh-token-validity: P30D
      generate-key-pair: ${JWT_GENERATE_KEY_PAIR:true}
      private-key: ${JWT_PRIVATE_KEY:}
      public-key: ${JWT_PUBLIC_KEY:}
    password:
      bcrypt-strength: 12
      minimum-length: 12
      require-uppercase: true
      require-lowercase: true
      require-digit: true
      require-special-character: true
      history-size: 5
      expiration: P90D
    login-attempts:
      max-attempts: 5
      lockout-duration: PT30M
      reset-window: PT30M
    rate-limit:
      login-max-requests: 20
      login-window: PT1M
    cors:
      allowed-origins:
        - ${CORS_ORIGIN_DESKTOP:http://localhost:3000}
      allowed-methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      allowed-headers:
        - Authorization
        - Content-Type
        - X-Request-Id
        - X-Correlation-Id
      exposed-headers:
        - X-Request-Id
        - X-Correlation-Id
      allow-credentials: true
