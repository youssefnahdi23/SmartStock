# Production overlay.
# Usage:
#   helm upgrade --install smartstock ./helm/smartstock \
#     -n smartstock-prod --create-namespace \
#     -f helm/smartstock/values-prod.yaml \
#     --set global.imageTag=<immutable-tag-or-digest>
#
# NO secrets in this file. secrets.create=false → the chart references an existing
# Kubernetes Secret provisioned by External Secrets Operator / Sealed Secrets / SOPS.
# That Secret MUST expose keys: JWT_SECRET, DB_USER, DB_PASSWORD.

springProfile: prod

global:
  imagePullPolicy: IfNotPresent   # pin an immutable tag/digest via --set global.imageTag
  imagePullSecrets:
    - name: ghcr-pull

config:
  # Point at managed/clustered infra endpoints.
  kafkaBootstrapServers: "kafka-bootstrap.messaging.svc:9092"
  otelExporterOtlpEndpoint: "http://tempo.observability.svc:4318"
  lokiUrl: "http://loki.observability.svc:3100"
  tracingSamplingProbability: "0.1"

secrets:
  create: false
  existingSecret: "smartstock-secrets"   # populated by the ExternalSecret below

# Sync the app Secret from the external store (AWS Secrets Manager / Vault) via ESO.
externalSecret:
  enabled: true
  refreshInterval: 1h
  secretStore:
    name: smartstock-secret-store
    kind: ClusterSecretStore

resources:
  requests:
    cpu: 250m
    memory: 768Mi
  limits:
    cpu: "2"
    memory: 1536Mi

networkPolicy:
  enabled: true

# HA hardening: spread replicas across nodes and protect them during drains.
topologySpread:
  enabled: true
  topologyKey: topology.kubernetes.io/zone
  whenUnsatisfiable: ScheduleAnyway
podDisruptionBudget:
  enabled: true
  maxUnavailable: 1

# Managed Postgres (RDS/Cloud SQL) — no in-cluster StatefulSets in prod.
postgres:
  enabled: false

# Daily encrypted-at-rest dumps to S3 with 30-day retention.
backup:
  enabled: true
  schedule: "0 2 * * *"
  retentionDays: 30
  s3:
    bucket: smartstock-prod-backups
    region: us-east-1
    endpoint: ""            # AWS S3
    credentialsSecret: smartstock-backup-s3

ingress:
  enabled: true
  className: nginx
  host: api.smartstock.example.com
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  tls:
    - hosts: [ api.smartstock.example.com ]
      secretName: smartstock-tls

# Production service overrides.
# DB hosts point at managed Postgres (RDS/Cloud SQL) reachable in the `data`
# namespace — postgres.enabled=false, so nothing is self-hosted. Adjust the FQDNs
# to your provider's endpoints. Autoscaling per roadmap M8 (inventory, sales-order,
# api-gateway).
services:
  api-gateway:
    replicas: 2
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 12
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 80
  identity-service:
    database:
      host: postgres-identity.data.svc
  product-service:
    database:
      host: postgres-product.data.svc
  warehouse-service:
    database:
      host: postgres-warehouse.data.svc
  supplier-service:
    database:
      host: postgres-supplier.data.svc
  customer-service:
    database:
      host: postgres-customer.data.svc
  purchase-order-service:
    database:
      host: postgres-purchase-order.data.svc
  inventory-service:
    replicas: 2
    database:
      host: postgres-inventory.data.svc
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 10
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 80
  sales-order-service:
    replicas: 2
    database:
      host: postgres-sales-order.data.svc
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 8
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 80
