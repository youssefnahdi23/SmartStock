name: Bug Report
description: Report a bug or unexpected behavior in SmartStock AI
title: "fix: [Service] Brief description of the bug"
labels: [ "bug", "triage" ]
assignees: [ "youssefnahdi23" ]

body:
  - type: markdown
    attributes:
      value: |
        ## Bug Report
        Thank you for taking the time to report a bug. Please fill in as much detail as possible to help us reproduce and fix the issue.

  - type: dropdown
    id: service
    attributes:
      label: Affected Service
      description: Which microservice is affected?
      multiple: true
      options:
        - identity-service
        - product-service
        - inventory-service
        - warehouse-service
        - supplier-service
        - customer-service
        - order-service
        - audit-service
        - notification-service
        - reporting-service
        - analytics-service
        - data-export-service
        - api-gateway
        - desktop-client
        - infrastructure
        - other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Call endpoint `POST /api/v1/...`
        2. With payload `{ ... }`
        3. Observe error `...`
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: A clear and concise description of what actually happened.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs or Error Messages
      description: Paste any relevant log output. Do NOT include sensitive data (passwords, tokens, personal information).
      render: shell

  - type: input
    id: java-version
    attributes:
      label: Java Version
      placeholder: "e.g. 21.0.2"
    validations:
      required: false

  - type: input
    id: spring-boot-version
    attributes:
      label: Spring Boot Version
      placeholder: "e.g. 3.2.1"
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "e.g. Ubuntu 22.04, macOS 14.0, Windows 11"
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context about the problem here (screenshots, API request/response, etc.).

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I have searched existing issues to avoid duplicates
          required: true
        - label: I have not included any sensitive data (passwords, tokens, PII) in this report
          required: true
        - label: I can reproduce this issue consistently
          required: false
