version: '3.8'

# SmartStock AI - Docker Compose Configuration
# For development and local testing only
# Production: Use Kubernetes (see ADR-0010)

services:
  # PostgreSQL Databases
  postgres-identity:
    image: postgres:16-alpine
    container_name: smartstock-postgres-identity
    environment:
      POSTGRES_DB: smartstock_identity
      POSTGRES_USER: smartstock
      POSTGRES_PASSWORD: ${DB_PASSWORD:-smartstock123}
    volumes:
      - postgres-identity-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartstock -d smartstock_identity"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartstock-network

  postgres-product:
    image: postgres:16-alpine
    container_name: smartstock-postgres-product
    environment:
      POSTGRES_DB: smartstock_product
      POSTGRES_USER: smartstock
      POSTGRES_PASSWORD: ${DB_PASSWORD:-smartstock123}
    volumes:
      - postgres-product-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartstock -d smartstock_product"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartstock-network

  postgres-inventory:
    image: postgres:16-alpine
    container_name: smartstock-postgres-inventory
    environment:
      POSTGRES_DB: smartstock_inventory
      POSTGRES_USER: smartstock
      POSTGRES_PASSWORD: ${DB_PASSWORD:-smartstock123}
    volumes:
      - postgres-inventory-data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartstock -d smartstock_inventory"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartstock-network

  postgres-warehouse:
    image: postgres:16-alpine
    container_name: smartstock-postgres-warehouse
    environment:
      POSTGRES_DB: smartstock_warehouse
      POSTGRES_USER: smartstock
      POSTGRES_PASSWORD: ${DB_PASSWORD:-smartstock123}
    volumes:
      - postgres-warehouse-data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartstock -d smartstock_warehouse"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartstock-network

  # Redis for Caching & Sessions (ADR-0011)
  redis:
    image: redis:7-alpine
    container_name: smartstock-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-smartstock123}
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartstock-network

  # Kafka for Event Streaming (ADR-0004)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: smartstock-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_SYNC_LIMIT: 2
      ZOOKEEPER_INIT_LIMIT: 5
    ports:
      - "2181:2181"
    networks:
      - smartstock-network

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: smartstock-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
      - "29092:29092"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions.sh", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartstock-network

  # MinIO for Object Storage (S3-compatible, for data export)
  minio:
    image: minio/minio:latest
    container_name: smartstock-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - smartstock-network

networks:
  smartstock-network:
    driver: bridge

volumes:
  postgres-identity-data:
    driver: local
  postgres-product-data:
    driver: local
  postgres-inventory-data:
    driver: local
  postgres-warehouse-data:
    driver: local
  redis-data:
    driver: local
  minio-data:
    driver: local
