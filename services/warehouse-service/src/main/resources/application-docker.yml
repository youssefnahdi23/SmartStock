spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres-warehouse}:${DB_PORT:5432}/smartstock_warehouse
    username: ${DB_USER:smartstock}
    password: ${DB_PASSWORD:smartstock}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}

  jpa:
    properties:
      hibernate:
        format_sql: false

logging:
  level:
    root: INFO
    com.smartstock.warehouse: INFO
