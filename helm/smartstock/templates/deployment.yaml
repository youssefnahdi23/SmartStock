{{- $ctx := . -}}
{{- range $name, $svc := .Values.services }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    {{- include "smartstock.labels" $ctx | nindent 4 }}
    {{- include "smartstock.selectorLabels" (dict "svc" $name "ctx" $ctx) | nindent 4 }}
spec:
  {{- if not (dig "hpa" "enabled" false $svc) }}
  replicas: {{ $svc.replicas | default 1 }}
  {{- end }}
  # ── Rolling updates ──────────────────────────────────────────────────────────
  # Zero-downtime deploys: bring up surplus pods before terminating old ones and
  # never drop below the desired count. minReadySeconds keeps a new pod out of
  # rotation until it has been Ready and stable, so a crash-looping revision can't
  # take the whole Deployment down mid-rollout.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      {{- /* IntOrString: emit integers bare and percent strings as-is — never
           force-quote, or the API rejects an integer value like 0. */}}
      maxSurge: {{ dig "rollingUpdate" "maxSurge" $ctx.Values.rollingUpdate.maxSurge $svc }}
      maxUnavailable: {{ dig "rollingUpdate" "maxUnavailable" $ctx.Values.rollingUpdate.maxUnavailable $svc }}
  revisionHistoryLimit: {{ $ctx.Values.revisionHistoryLimit | default 5 }}
  minReadySeconds: {{ $ctx.Values.minReadySeconds | default 10 }}
  progressDeadlineSeconds: {{ $ctx.Values.progressDeadlineSeconds | default 600 }}
  selector:
    matchLabels:
      {{- include "smartstock.selectorLabels" (dict "svc" $name "ctx" $ctx) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "smartstock.labels" $ctx | nindent 8 }}
        {{- include "smartstock.selectorLabels" (dict "svc" $name "ctx" $ctx) | nindent 8 }}
      annotations:
        # Roll pods when the shared ConfigMap/Secret changes so config edits take
        # effect on `helm upgrade` (envFrom does not auto-reload).
        checksum/config: {{ include (print $ctx.Template.BasePath "/configmap.yaml") $ctx | sha256sum }}
        {{- if $ctx.Values.secrets.create }}
        checksum/secret: {{ include (print $ctx.Template.BasePath "/secret.yaml") $ctx | sha256sum }}
        {{- end }}
        # Scrape Prometheus metrics from the actuator endpoint.
        prometheus.io/scrape: "true"
        prometheus.io/path: /api/v1/actuator/prometheus
        prometheus.io/port: {{ $svc.port | quote }}
    spec:
      serviceAccountName: {{ include "smartstock.serviceAccountName" $ctx }}
      {{- with $ctx.Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      # Graceful shutdown: give Spring Boot time to drain in-flight requests and
      # commit outbox work before SIGKILL. Pairs with server.shutdown=graceful.
      terminationGracePeriodSeconds: {{ $ctx.Values.terminationGracePeriodSeconds | default 45 }}
      {{- if $ctx.Values.topologySpread.enabled }}
      # Spread replicas across nodes/zones so a single node/zone loss can't take
      # out every replica of a service (availability during DR / node drain).
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: {{ $ctx.Values.topologySpread.topologyKey | quote }}
          whenUnsatisfiable: {{ $ctx.Values.topologySpread.whenUnsatisfiable | quote }}
          labelSelector:
            matchLabels:
              {{- include "smartstock.selectorLabels" (dict "svc" $name "ctx" $ctx) | nindent 14 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: {{ $name }}
          image: {{ include "smartstock.image" (dict "svc" $name "ctx" $ctx) }}
          imagePullPolicy: {{ $ctx.Values.global.imagePullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: [ "ALL" ]
          # preStop sleep lets the Ingress/kube-proxy remove this pod from the
          # Service endpoints before the JVM starts shutting down, so no request
          # is routed to a terminating pod during a rolling update.
          lifecycle:
            preStop:
              exec:
                command: [ "sh", "-c", "sleep {{ $ctx.Values.preStopSleepSeconds | default 10 }}" ]
          ports:
            - name: http
              containerPort: {{ $svc.port }}
          envFrom:
            - configMapRef:
                name: {{ include "smartstock.fullname" $ctx }}-config
          env:
            - name: SERVER_PORT
              value: {{ $svc.port | quote }}
            - name: OTEL_SERVICE_NAME
              value: {{ $name | quote }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "smartstock.secretName" $ctx }}
                  key: JWT_SECRET
            {{- if $svc.database.enabled }}
            - name: DB_HOST
              value: {{ $svc.database.host | quote }}
            - name: DB_PORT
              value: {{ $svc.database.port | default 5432 | quote }}
            - name: DB_NAME
              value: {{ $svc.database.name | quote }}
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "smartstock.secretName" $ctx }}
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "smartstock.secretName" $ctx }}
                  key: DB_PASSWORD
            {{- end }}
          readinessProbe:
            httpGet:
              path: {{ $ctx.Values.probePath }}
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: {{ $ctx.Values.probePath }}
              port: http
            initialDelaySeconds: 90
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml ($svc.resources | default $ctx.Values.resources) | nindent 12 }}
{{- end }}
