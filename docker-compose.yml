    driver: local
  postgres-warehouse-data:
    driver: local
  postgres-supplier-data:
    driver: local
  postgres-customer-data:
    driver: local
  postgres-purchase-order-data:
    driver: local
  postgres-sales-order-data:
    driver: local

  # Caching
  redis-data:
    driver: local

  # Messaging
  rabbitmq-data:
    driver: local

  # Storage
  minio-data:
    driver: local

  # Observability
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  loki-data:
    driver: local
  tempo-data:
    driver: local

  # Administration
