# Grafana Dashboards Provisioning
# Loads all JSON files from /var/lib/grafana/dashboards into the default org.

apiVersion: 1

providers:
  - name: 'SmartStock Dashboards'
    orgId: 1
    folder: 'SmartStock'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
