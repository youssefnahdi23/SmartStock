{{- $ctx := . -}}
{{/*
Self-hosted PostgreSQL — one StatefulSet + headless Service + PersistentVolume
per database-backed service (database-per-service topology).

Enabled by `postgres.enabled` and intended for local (kind/minikube) or
self-managed clusters. In staging/prod set postgres.enabled=false and point
services.<svc>.database.host at a managed instance (RDS/Cloud SQL) — see
values-prod.yaml.

Storage: each StatefulSet declares a volumeClaimTemplate, so the cluster
dynamically provisions a PersistentVolume (via storageClass) and binds a
PersistentVolumeClaim that survives pod rescheduling and restarts.
*/}}
{{- if $ctx.Values.postgres.enabled }}
{{- range $name, $svc := .Values.services }}
{{- if $svc.database.enabled }}
{{- $pg := $svc.database.host }}
---
# Headless Service — stable network identity for the StatefulSet pod.
apiVersion: v1
kind: Service
metadata:
  name: {{ $pg }}
  labels:
    {{- include "smartstock.labels" $ctx | nindent 4 }}
    app.kubernetes.io/name: {{ $pg }}
    app.kubernetes.io/component: database
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: {{ $pg }}
  ports:
    - name: postgres
      port: {{ $svc.database.port | default 5432 }}
      targetPort: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $pg }}
  labels:
    {{- include "smartstock.labels" $ctx | nindent 4 }}
    app.kubernetes.io/name: {{ $pg }}
    app.kubernetes.io/component: database
spec:
  serviceName: {{ $pg }}
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $pg }}
  template:
    metadata:
      labels:
        {{- include "smartstock.labels" $ctx | nindent 8 }}
        app.kubernetes.io/name: {{ $pg }}
        app.kubernetes.io/component: database
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999            # postgres UID in the official image
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: {{ $ctx.Values.postgres.image | quote }}
          imagePullPolicy: {{ $ctx.Values.global.imagePullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ "ALL" ]
          ports:
            - name: postgres
              containerPort: {{ $svc.database.port | default 5432 }}
          env:
            - name: POSTGRES_DB
              value: {{ $svc.database.name | quote }}
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "smartstock.secretName" $ctx }}
                  key: DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "smartstock.secretName" $ctx }}
                  key: DB_PASSWORD
            # Keep the data dir a sub-path so lost+found on the PV root doesn't
            # break initdb.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          readinessProbe:
            exec:
              command: [ "sh", "-c", "pg_isready -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\"" ]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            exec:
              command: [ "sh", "-c", "pg_isready -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\"" ]
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml $ctx.Values.postgres.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "smartstock.labels" $ctx | nindent 10 }}
          app.kubernetes.io/name: {{ $pg }}
      spec:
        accessModes: [ "ReadWriteOnce" ]
        {{- if $ctx.Values.postgres.storageClass }}
        storageClassName: {{ $ctx.Values.postgres.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ $ctx.Values.postgres.storageSize | quote }}
{{- end }}
{{- end }}
{{- end }}
