version: '3.8'

# ──────────────────────────────────────────────────────────────────────────────
# DEPRECATED — DO NOT USE FOR RC1.
#
# This file predates the canonical setup and is INCONSISTENT with the current
# architecture:
#   * It uses a single shared `smartstock` database, violating the
#     database-per-service rule (ADR-0003/ADR-0012). The canonical per-service
#     PostgreSQL instances live in docker-compose.yml.
#   * Its `build.context: ./services/<svc>` is wrong: the service Dockerfiles use
#     the repository root as build context (COPY services/<svc>/target/...).
#   * Its container names and host ports collide with docker-compose.yml.
#
# Canonical workflow (see DEPLOYMENT_REPORT.md):
#   1. `mvn -f services/pom.xml clean package`
#   2. `docker compose up -d`            # infrastructure + databases + gateway
#   3. `docker build -f services/<svc>/Dockerfile -t smartstock/<svc>:1.0.0 .`
#
# Retained only so existing `Makefile.services` targets do not break. It will be
# removed once those targets are migrated to docker-compose.yml.
# ──────────────────────────────────────────────────────────────────────────────

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: smartstock-postgres
    environment:
      POSTGRES_DB: smartstock
      POSTGRES_USER: ${DB_USER:-smartstock}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-smartstock123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - smartstock

  # Kafka
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: smartstock-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    networks:
      - smartstock

  # Zookeeper
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: smartstock-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"
    networks:
      - smartstock

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: smartstock-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - smartstock

  # Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: smartstock-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    networks:
      - smartstock

  # Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: smartstock-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - smartstock

  # Identity Service
  identity-service:
    build:
      context: ./services/identity-service
      dockerfile: Dockerfile
    container_name: smartstock-identity
    depends_on:
      - postgres
      - kafka
    environment:
      SERVER_PORT: 8081
      DB_USER: smartstock
      DB_PASSWORD: smartstock
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8081:8080"
    networks:
      - smartstock

  # Product Service
  product-service:
    build:
      context: ./services/product-service
      dockerfile: Dockerfile
    container_name: smartstock-product
    depends_on:
      - postgres
      - kafka
    environment:
      SERVER_PORT: 8082
      DB_USER: smartstock
      DB_PASSWORD: smartstock
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8082:8080"
    networks:
      - smartstock

  # Warehouse Service
  warehouse-service:
    build:
      context: ./services/warehouse-service
      dockerfile: Dockerfile
    container_name: smartstock-warehouse
    depends_on:
      - postgres
      - kafka
    environment:
      SERVER_PORT: 8083
      DB_USER: smartstock
      DB_PASSWORD: smartstock
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8083:8080"
    networks:
      - smartstock

  # Inventory Service
  inventory-service:
    build:
      context: ./services/inventory-service
      dockerfile: Dockerfile
    container_name: smartstock-inventory
    depends_on:
      - postgres
      - kafka
    environment:
      SERVER_PORT: 8084
      DB_USER: smartstock
      DB_PASSWORD: smartstock
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8084:8080"
    networks:
      - smartstock

  # Supplier Service
  supplier-service:
    build:
      context: ./services/supplier-service
      dockerfile: Dockerfile
    container_name: smartstock-supplier
    depends_on:
      - postgres
      - kafka
    environment:
      SERVER_PORT: 8085
      DB_USER: smartstock
      DB_PASSWORD: smartstock
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8085:8080"
    networks:
      - smartstock

  # Customer Service
  customer-service:
    build:
      context: ./services/customer-service
      dockerfile: Dockerfile
    container_name: smartstock-customer
    depends_on:
      - postgres
      - kafka
    environment:
      SERVER_PORT: 8086
      DB_USER: smartstock
      DB_PASSWORD: smartstock
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8086:8080"
    networks:
      - smartstock

  # Audit Service
  audit-service:
    build:
      context: ./services/audit-service
      dockerfile: Dockerfile
    container_name: smartstock-audit
    depends_on:
      - postgres
      - kafka
    environment:
      SERVER_PORT: 8087
      DB_USER: smartstock
      DB_PASSWORD: smartstock
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8087:8080"
    networks:
      - smartstock

  # Order Service
  order-service:
    build:
      context: ./services/order-service
      dockerfile: Dockerfile
    container_name: smartstock-order
    depends_on:
      - postgres
      - kafka
    environment:
