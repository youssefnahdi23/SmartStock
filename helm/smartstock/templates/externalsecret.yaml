{{- $ctx := . -}}
{{/*
Production secrets path. When externalSecret.enabled=true the chart renders an
ExternalSecret (External Secrets Operator CRD) that syncs JWT_SECRET / DB_USER /
DB_PASSWORD from an external store (AWS Secrets Manager, Vault, GCP SM, …) into
the Kubernetes Secret named by secrets.existingSecret. No plaintext ever lives in
the chart or git.

Pair with values-prod.yaml (secrets.create=false, secrets.existingSecret set).
Requires External Secrets Operator installed and a ClusterSecretStore/SecretStore.
The CRD schema is not bundled with Kubernetes; kubeconform skips it via
-ignore-missing-schemas.
*/}}
{{- if $ctx.Values.externalSecret.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ required "secrets.existingSecret is required when externalSecret.enabled=true" $ctx.Values.secrets.existingSecret }}
  labels:
    {{- include "smartstock.labels" $ctx | nindent 4 }}
spec:
  refreshInterval: {{ $ctx.Values.externalSecret.refreshInterval | default "1h" | quote }}
  secretStoreRef:
    name: {{ $ctx.Values.externalSecret.secretStore.name | quote }}
    kind: {{ $ctx.Values.externalSecret.secretStore.kind | default "ClusterSecretStore" | quote }}
  target:
    name: {{ $ctx.Values.secrets.existingSecret | quote }}
    creationPolicy: Owner
  data:
    {{- range $k, $remoteKey := $ctx.Values.externalSecret.remoteKeys }}
    - secretKey: {{ $k | quote }}
      remoteRef:
        key: {{ $remoteKey | quote }}
    {{- end }}
{{- end }}
