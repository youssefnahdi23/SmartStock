spring:
  application:
    name: customer-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:smartstock_customer}
    username: ${DB_USER:smartstock}
    password: ${DB_PASSWORD:smartstock}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
          fetch_size: 50
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: customer-service-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        # Producers send sales-order events with no type headers (add.type.headers=false),
        # so pin the target type explicitly. The tolerant payload ignores unknown fields,
        # so a single default type works for every event multiplexed on the topic (C-4).
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.smartstock.customer.event.SalesOrderEventPayload

server:
  port: ${SERVER_PORT:8006}
  servlet:
    context-path: /api/v1

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,loggers
      base-path: /actuator
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    root: INFO
    com.smartstock: DEBUG
  file:
    name: logs/customer-service.log

# Transactional outbox relay (debt C-2): this service produces domain events.
# Consumer hardening (debt H-3): this service also consumes sales-order events.
smartstock:
  outbox:
    enabled: true
    poll-interval-ms: 2000
    batch-size: 100
  consumer:
    enabled: true
