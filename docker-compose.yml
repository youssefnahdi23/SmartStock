version: '3.8'

# SmartStock AI - Complete Development Infrastructure
# Includes: Databases, Message Brokers, Caching, Observability, Logging, Tracing
# For development and local testing only
# Production: Use Kubernetes (see ADR-0010)

# All configuration via environment variables
# Copy .env.example to .env and customize as needed

services:
  # ═════════════════════════════════════════════════════════════════════════════
  # DATABASES
  # ═════════════════════════════════════════════════════════════════════════════

  # PostgreSQL - Identity Service
  postgres-identity:
    image: postgres:16-alpine
    container_name: smartstock-postgres-identity
    environment:
      POSTGRES_DB: smartstock_identity
      POSTGRES_USER: ${DB_USER:-smartstock}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-smartstock123}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - postgres-identity-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-smartstock} -d smartstock_identity"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartstock-network
    labels:
      service: postgres
      database: identity

  # PostgreSQL - Product Service
  postgres-product:
    image: postgres:16-alpine
    container_name: smartstock-postgres-product
    environment:
      POSTGRES_DB: smartstock_product
      POSTGRES_USER: ${DB_USER:-smartstock}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-smartstock123}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - postgres-product-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-smartstock} -d smartstock_product"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartstock-network
    labels:
      service: postgres
      database: product

  # PostgreSQL - Inventory Service
  postgres-inventory:
    image: postgres:16-alpine
    container_name: smartstock-postgres-inventory
    environment:
      POSTGRES_DB: smartstock_inventory
      POSTGRES_USER: ${DB_USER:-smartstock}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-smartstock123}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - postgres-inventory-data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-smartstock} -d smartstock_inventory"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartstock-network
    labels:
      service: postgres
      database: inventory

  # PostgreSQL - Warehouse Service
  postgres-warehouse:
    image: postgres:16-alpine
    container_name: smartstock-postgres-warehouse
    environment:
      POSTGRES_DB: smartstock_warehouse
      POSTGRES_USER: ${DB_USER:-smartstock}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-smartstock123}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - postgres-warehouse-data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-smartstock} -d smartstock_warehouse"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartstock-network
    labels:
      service: postgres
      database: warehouse

  # ═════════════════════════════════════════════════════════════════════════════
  # CACHING & SESSION STORE
  # ═════════════════════════════════════════════════════════════════════════════

  # Redis - Caching & Sessions (ADR-0011)
  redis:
    image: redis:7-alpine
    container_name: smartstock-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-smartstock123} --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartstock-network
    labels:
      service: cache

  # ═════════════════════════════════════════════════════════════════════════════
  # MESSAGE BROKERS
  # ═════════════════════════════════════════════════════════════════════════════

  # Kafka - Event Streaming (ADR-0004)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: smartstock-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_SYNC_LIMIT: 2
      ZOOKEEPER_INIT_LIMIT: 5
      ZOO_LOG4J_ROOT_LOGLEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "2181:2181"
    networks:
      - smartstock-network
    labels:
      service: messaging

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: smartstock-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG4J_ROOT_LOGLEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "9092:9092"
      - "29092:29092"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions.sh", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartstock-network
    labels:
      service: messaging

  # RabbitMQ - Alternative Message Broker
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: smartstock-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartstock-network
    labels:
      service: messaging

  # ═════════════════════════════════════════════════════════════════════════════
  # OBJECT STORAGE
  # ═════════════════════════════════════════════════════════════════════════════

  # MinIO - S3-compatible Object Storage
  minio:
    image: minio/minio:latest
    container_name: smartstock-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - smartstock-network
    labels:
      service: storage

  # ═════════════════════════════════════════════════════════════════════════════
  # OBSERVABILITY: METRICS
  # ═════════════════════════════════════════════════════════════════════════════

  # Prometheus - Metrics Collection & Storage (ADR-0009)
  prometheus:
    image: prom/prometheus:latest
    container_name: smartstock-prometheus
    environment:
      TZ: ${TZ:-UTC}
    volumes:
      - ./infrastructure/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartstock-network
    labels:
      service: observability
    depends_on:
      - postgres-identity

  # Grafana - Dashboards & Visualization
  grafana:
    image: grafana/grafana:latest
    container_name: smartstock-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
      GF_LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartstock-network
    labels:
      service: observability
    depends_on:
      - prometheus

  # ═════════════════════════════════════════════════════════════════════════════
  # OBSERVABILITY: LOGGING
  # ═════════════════════════════════════════════════════════════════════════════

  # Loki - Log Aggregation (ADR-0009)
  loki:
    image: grafana/loki:latest
    container_name: smartstock-loki
    environment:
      LOKI_LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ./infrastructure/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartstock-network
    labels:
      service: observability

  # ═════════════════════════════════════════════════════════════════════════════
  # OBSERVABILITY: TRACING
  # ═════════════════════════════════════════════════════════════════════════════

  # Tempo - Distributed Tracing (ADR-0009)
  tempo:
    image: grafana/tempo:latest
    container_name: smartstock-tempo
    environment:
      TEMPO_LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ./infrastructure/tempo-config.yml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    command: [ "-config.file=/etc/tempo.yaml" ]
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3200/status"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartstock-network
    labels:
      service: observability

  # ═════════════════════════════════════════════════════════════════════════════
  # DATABASE ADMINISTRATION
  # ═════════════════════════════════════════════════════════════════════════════

  # pgAdmin - PostgreSQL Administration UI
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: smartstock-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@smartstock.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
      PGADMIN_CONFIG_PROXY_X_FOR_COUNT: 1
      PGADMIN_CONFIG_PROXY_X_PROTO_COUNT: 1
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: "False"
      PGADMIN_CONFIG_COOKIE_DEFAULT_SECURE: "False"
      PGADMIN_CONFIG_COOKIE_SAMESITE: "Lax"
      PGADMIN_CONFIG_CONSOLE_LOG_LEVEL: ${LOG_LEVEL:-10}
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    ports:
      - "5050:80"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/misc/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartstock-network
    labels:
      service: administration
    depends_on:
      postgres-identity:
        condition: service_healthy
      postgres-product:
        condition: service_healthy
      postgres-inventory:
        condition: service_healthy
      postgres-warehouse:
        condition: service_healthy

  # ═════════════════════════════════════════════════════════════════════════════
  # EMAIL TESTING
  # ═════════════════════════════════════════════════════════════════════════════

  # Mailpit - Email Testing & Debugging
  mailpit:
    image: axllent/mailpit:latest
    container_name: smartstock-mailpit
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"
      MP_LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "1025:1025"
      - "8025:8025"
    volumes:
      - mailpit-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8025/api/v1/info"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartstock-network
    labels:
      service: email

networks:
  smartstock-network:
    driver: bridge

volumes:
  # PostgreSQL
  postgres-identity-data:
    driver: local
  postgres-product-data:
    driver: local
  postgres-inventory-data:
    driver: local
  postgres-warehouse-data:
    driver: local

  # Caching
  redis-data:
    driver: local

  # Messaging
  rabbitmq-data:
    driver: local

  # Storage
  minio-data:
    driver: local

  # Observability
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  loki-data:
    driver: local
  tempo-data:
    driver: local

  # Administration
  pgadmin-data:
    driver: local

  # Email
  mailpit-data:
    driver: local
