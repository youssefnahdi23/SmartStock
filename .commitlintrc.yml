extends:
  - '@commitlint/config-conventional'

rules:
  # Type must be one of the allowed values
  type-enum:
    - 2
    - always
    - - feat
      - fix
      - docs
      - style
      - refactor
      - test
      - chore
      - ci
      - perf
      - revert
      - build

  # Type must be lowercase
  type-case:
    - 2
    - always
    - lower-case

  # Scope must be lowercase if provided
  scope-case:
    - 2
    - always
    - lower-case

  # Subject must not be empty
  subject-empty:
    - 2
    - never

  # Subject must not end with a period
  subject-full-stop:
    - 2
    - never
    - '.'

  # Subject must be sentence-case or lower-case
  subject-case:
    - 2
    - always
    - - sentence-case
      - lower-case
      - start-case
      - pascal-case
      - upper-case

  # Header must not exceed 100 characters
  header-max-length:
    - 2
    - always
    - 100

  # Body must have a blank line before it
  body-leading-blank:
    - 1
    - always

  # Footer must have a blank line before it
  footer-leading-blank:
    - 1
    - always
