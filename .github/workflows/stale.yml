name: Stale Issues and PRs

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC
  workflow_dispatch:

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Mark Stale Issues and Pull Requests
        uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          # --- Issues ---
          days-before-issue-stale: 30
          days-before-issue-close: 14
          stale-issue-label: stale
          stale-issue-message: >
            This issue has been automatically marked as stale because it has had no activity for 30 days.
            It will be closed in 14 days if no further activity occurs.
            If this issue is still relevant, please leave a comment or update the issue.
          close-issue-message: >
            This issue has been automatically closed due to inactivity.
            Feel free to reopen it if it remains relevant.

          # --- Pull Requests ---
          days-before-pr-stale: 21
          days-before-pr-close: 7
          stale-pr-label: stale
          stale-pr-message: >
            This pull request has been automatically marked as stale because it has had no activity for 21 days.
            It will be closed in 7 days if no further activity occurs.
            Please update the PR or leave a comment if you intend to continue working on it.
          close-pr-message: >
            This pull request has been automatically closed due to inactivity.
            Feel free to reopen it if the work is still relevant.

          # --- Exemptions ---
          exempt-issue-labels: 'pinned,security,bug,in-progress,blocked'
          exempt-pr-labels: 'pinned,security,in-progress,blocked,dependencies'
          exempt-all-milestones: true

          # --- Limits ---
          operations-per-run: 100
          remove-stale-when-updated: true
          ascending: true
