# Docker profile — defaults target the docker-compose service network.
# Every value stays overridable via environment variables passed by compose.
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres-supplier}:${DB_PORT:5432}/${DB_NAME:smartstock_supplier}
    username: ${DB_USER:smartstock}
    password: ${DB_PASSWORD:smartstock}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:29092}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    root: INFO
    com.smartstock: INFO
