spring:
  # Kafka auto-configuration stays ENABLED so KafkaProperties (required by the transactional
  # outbox auto-config) is present. Tests never reach a broker: producers are lazy and listener
  # containers are stopped from starting.
  kafka:
    bootstrap-servers: localhost:9092
    listener:
      auto-startup: false

  datasource:
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

app:
  jwt:
    secret: test-secret-that-is-long-enough-for-hs512-minimum-512-bits-requirement-here
    expiration-ms: 86400000

logging:
  level:
    root: WARN
    com.smartstock: INFO
