    networks:
      - smartstock

  # Notification Service
  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: smartstock-notification
    depends_on:
      - postgres
      - kafka
    environment:
      SERVER_PORT: 8089
      DB_USER: smartstock
      DB_PASSWORD: smartstock
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8089:8080"
    networks:
      - smartstock

  # Reporting Service
  reporting-service:
    build:
      context: ./services/reporting-service
      dockerfile: Dockerfile
    container_name: smartstock-reporting
    depends_on:
      - postgres
      - kafka
    environment:
      SERVER_PORT: 8090
      DB_USER: smartstock
      DB_PASSWORD: smartstock
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
