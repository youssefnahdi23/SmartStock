# Grafana Dashboards Provisioning
# Automatically loads dashboards from /var/lib/grafana/dashboards

apiVersion: 1

providers:
  - name: 'SmartStock Dashboards'
    orgId: 1
    folder: ''
    type: file
    disableDeletion: false
    editable: true
    options:
      path: /var/lib/grafana/dashboards
