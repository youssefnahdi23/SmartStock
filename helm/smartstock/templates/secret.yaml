{{- if .Values.secrets.create }}
# DEV ONLY. Rendered from values so `helm install` works on kind/minikube with no
# external dependencies. For staging/prod set secrets.create=false and provide
# secrets.existingSecret managed by External Secrets Operator / Sealed Secrets / SOPS.
# The Secret must expose these three keys regardless of source.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "smartstock.fullname" . }}-secrets
  labels:
    {{- include "smartstock.labels" . | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET: {{ required "secrets.jwtSecret is required when secrets.create=true" .Values.secrets.jwtSecret | quote }}
  DB_USER: {{ .Values.secrets.dbUser | quote }}
  DB_PASSWORD: {{ .Values.secrets.dbPassword | quote }}
{{- end }}
