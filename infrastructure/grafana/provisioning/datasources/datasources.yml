# Grafana Datasources Provisioning
# Automatically configures Prometheus, Loki, and Tempo as datasources

apiVersion: 1

datasources:
  # Prometheus - Metrics
  - name: Prometheus
    type: prometheus
    url: http://prometheus:9090
    access: proxy
    isDefault: true
    editable: true
    jsonData:
      timeInterval: 30s
    version: 1

  # Loki - Logs
  - name: Loki
    type: loki
    url: http://loki:3100
    access: proxy
    editable: true
    version: 1

  # Tempo - Traces
  - name: Tempo
    type: tempo
    url: http://tempo:3200
    access: proxy
    editable: true
    jsonData:
      serviceMap:
        enabled: true
      search:
        enabled: true
      nodeGraph:
        enabled: true
      lokiSearch:
        datasourceUid: loki_uid
    version: 1
