  # Data Export Service
  data-export-service:
    build:
      context: ./services/data-export-service
      dockerfile: Dockerfile
    container_name: smartstock-dataexport
    depends_on:
      - postgres
      - kafka
    environment:
      SERVER_PORT: 8091
      DB_USER: smartstock
      DB_PASSWORD: smartstock
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8091:8080"
    networks:
      - smartstock

  # Analytics Service
  analytics-service:
    build:
      context: ./services/analytics-service
      dockerfile: Dockerfile
    container_name: smartstock-analytics
    depends_on:
      - postgres
      - kafka
    environment:
      SERVER_PORT: 8092
      DB_USER: smartstock
      DB_PASSWORD: smartstock
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8092:8080"
    networks:
      - smartstock

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  smartstock:
    driver: bridge
