spring:
  # Kafka auto-configuration stays ENABLED so KafkaProperties (required by the transactional
  # outbox auto-config) is present. Tests never reach a broker: producers are lazy and listener
  # containers are stopped from starting.
  kafka:
    bootstrap-servers: localhost:9092
    listener:
      auto-startup: false

  flyway:
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: validate

app:
  jwt:
    secret: SmartStockTestSecretKeyForHS512JWTTokenSigningMustBe64BytesMinimumForSecurity2026

logging:
  level:
    root: WARN
    com.smartstock.warehouse: INFO
    org.flywaydb: INFO
