{{- if .Values.networkPolicy.enabled }}
{{- $ctx := . -}}
# Default-deny ingress for the release namespace, then allow only:
#   • traffic to the api-gateway (public entrypoint via Ingress controller)
#   • intra-namespace traffic between SmartStock pods
# Egress is left open (services need DB/Kafka/OTLP/Loki); tighten per ADR-0010.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "smartstock.fullname" $ctx }}-default-deny-ingress
  labels:
    {{- include "smartstock.labels" $ctx | nindent 4 }}
spec:
  podSelector: {}
  policyTypes: [ Ingress ]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "smartstock.fullname" $ctx }}-allow-intra-namespace
  labels:
    {{- include "smartstock.labels" $ctx | nindent 4 }}
spec:
  podSelector: {}
  policyTypes: [ Ingress ]
  ingress:
    - from:
        - podSelector: {}
{{- end }}
