version: 2
updates:
  # Enable version updates for Java/Maven dependencies
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    open-pull-requests-limit: 5
    pull-request-branch-name:
      separator: "/"
    commit-message:
      prefix: "chore(deps):"
      prefix-development: "chore(deps-dev):"
      include: "scope"
    reviewers:
      - "youssefnahdi23"
    labels:
      - "dependencies"
      - "maven"
    allow:
      - dependency-type: "direct"
      - dependency-type: "indirect"
    ignore:
      # Keep alpha/beta versions out of auto-updates
      - dependency-name: "org.springframework.cloud:*"
        versions: ["*-M*", "*-RC*", "*-SNAPSHOT"]

  # Docker base images
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
    open-pull-requests-limit: 5
    reviewers:
      - "youssefnahdi23"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(docker):"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: ".github/workflows"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
    open-pull-requests-limit: 5
    reviewers:
      - "youssefnahdi23"
    labels:
      - "github-actions"
    commit-message:
      prefix: "ci:"
